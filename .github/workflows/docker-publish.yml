name: Build and Publish KagiMCP Network Image

on:
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: "Optional upstream kagimcp ref (tag/branch/commit)"
        required: false
        type: string
      force_build:
        description: "Force build/push even if upstream ref is unchanged"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/kagimcp-network

jobs:
  resolve-upstream:
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.ref.outputs.ref }}
      changed: ${{ steps.compare.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve upstream ref
        id: ref
        uses: actions/github-script@v8
        with:
          script: |
            const manualRef = `${{ inputs.upstream_ref || '' }}`.trim();
            if (manualRef) {
              core.setOutput('ref', manualRef);
              return;
            }

            const { data } = await github.rest.repos.listTags({
              owner: 'kagisearch',
              repo: 'kagimcp',
              per_page: 1,
            });

            if (!data.length) {
              core.setFailed('No tags found in kagisearch/kagimcp');
              return;
            }

            core.setOutput('ref', data[0].name);

      - name: Read current pinned ref
        id: current
        shell: bash
        run: |
          if [[ -f .upstream-version ]]; then
            echo "current=$(tr -d '[:space:]' < .upstream-version)" >> "$GITHUB_OUTPUT"
          else
            echo "current=" >> "$GITHUB_OUTPUT"
          fi

      - name: Compare refs
        id: compare
        shell: bash
        run: |
          if [[ "${{ inputs.force_build }}" == "true" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ steps.current.outputs.current }}" == "${{ steps.ref.outputs.ref }}" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  build-and-push:
    runs-on: ubuntu-latest
    needs: resolve-upstream
    if: needs.resolve-upstream.outputs.changed == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            KAGIMCP_REF=${{ needs.resolve-upstream.outputs.ref }}
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ needs.resolve-upstream.outputs.ref }}

      - name: Update pinned upstream version
        shell: bash
        run: |
          echo "${{ needs.resolve-upstream.outputs.ref }}" > .upstream-version

      - name: Commit pinned version bump
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .upstream-version
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: bump upstream kagimcp to ${{ needs.resolve-upstream.outputs.ref }}"
          git push
