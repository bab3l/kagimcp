name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-and-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build -t kagimcp-network:ci --build-arg KAGIMCP_REF=$(cat .upstream-version) .

      - name: Run container
        run: |
          docker run -d --name kagimcp-ci \
            -e KAGI_API_KEY=dummy-key \
            -e MCP_TRANSPORT=streamable-http \
            -e MCP_PATH=/mcp \
            -p 8000:8000 \
            kagimcp-network:ci

      - name: Wait for health
        run: |
          for i in {1..30}; do
            status=$(docker inspect --format='{{.State.Health.Status}}' kagimcp-ci 2>/dev/null || true)
            if [ "$status" = "healthy" ]; then
              exit 0
            fi
            sleep 2
          done
          docker logs kagimcp-ci
          exit 1

      - name: MCP protocol smoke test
        run: |
          docker run --rm \
            --entrypoint python \
            --network container:kagimcp-ci \
            -v "$PWD:/work" \
            -w /work \
            kagimcp-network:ci \
            python scripts/mcp_streamable_smoke.py

      - name: Cleanup
        if: always()
        run: |
          docker rm -f kagimcp-ci || true
